<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">SlugSwap Logo Option A Icon</title>
  <desc id="desc">Interlocked serif S monogram on dark gradient square.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111217" />
      <stop offset="100%" stop-color="#1f2231" />
    </linearGradient>
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f1c76a" />
