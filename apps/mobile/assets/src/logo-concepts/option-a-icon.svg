  <rect width="1024" height="1024" rx="240" fill="url(#bg)" />
  <rect x="70" y="70" width="884" height="884" rx="190" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="8" />
  <text x="500" y="705" text-anchor="middle" fill="#f3f4f6" font-family="'Instrument Serif', 'Bodoni 72', Didot, Georgia, serif" font-size="650" letter-spacing="-32">S</text>
  <text x="542" y="705" text-anchor="middle" fill="url(#gold)" font-family="'Instrument Serif', 'Bodoni 72', Didot, Georgia, serif" font-size="650" letter-spacing="-32">S</text>
  <rect x="352" y="560" width="328" height="210" fill="#f3f4f6" fill-opacity="0.1" />
