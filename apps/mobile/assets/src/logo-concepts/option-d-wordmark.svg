<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 420" role="img" aria-labelledby="title desc">
  <title id="title">SlugSwap Option D Wordmark</title>
  <desc id="desc">SlugSwap wordmark with stylized banana slug underline.</desc>
