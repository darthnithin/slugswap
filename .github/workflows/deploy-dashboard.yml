name: Deploy Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard to production
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --cwd apps/dashboard --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: npx vercel build --prod --cwd apps/dashboard --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: npx vercel deploy --prebuilt --prod --cwd apps/dashboard --token=${{ secrets.VERCEL_TOKEN }}
